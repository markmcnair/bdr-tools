<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Ghost-Buster Filter Generator</title>
    <style>
        :root {
            --background-dark: #1a1a1a;
            --surface-dark: #2a2a2a;
            --primary-blue: #4a90e2;
            --text-light: #f0f0f0;
            --text-muted: #a0a0a0;
            --border-color: #404040;
            --green: #5cb85c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-light);
            margin: 0;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 { color: var(--text-light); margin-bottom: 0.5rem; }
        header p { color: var(--text-muted); margin-top: 0; }
        .grid-container { display: grid; grid-template-columns: 450px 1fr; gap: 2rem; }
        .card { background-color: var(--surface-dark); padding: 2rem; border-radius: 8px; border: 1px solid var(--border-color); }
        h2 { color: var(--primary-blue); border-bottom: 1px solid var(--border-color); padding-bottom: .5rem; margin-top: 0; }
        .input-group { margin-bottom: 1.25rem; }
        .input-group label { display: block; font-weight: 500; margin-bottom: .5rem; color: var(--text-muted); }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            background-color: var(--background-dark);
            color: var(--text-light);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        #generate-btn { 
            background-color: var(--primary-blue); 
            color: var(--white); 
            width: 100%; 
            padding: 1rem; 
            font-size: 1.2rem; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        #generate-btn:hover { background-color: #5a9ee8; }
        #results { display: none; }
        .template { border: 1px solid var(--border-color); border-radius: 5px; margin-bottom: 1.5rem; position: relative; background-color: var(--background-dark); }
        .template-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); }
        .template-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-light); }
        .template-body { padding: 1.5rem; white-space: pre-wrap; font-family: monospace, monospace; max-height: 250px; overflow-y: auto; color: var(--text-muted); }
        .copy-btn { 
            position: absolute; 
            top: .5rem; 
            right: .5rem; 
            background-color: var(--gray); 
            color: var(--white); 
            border: none; 
            padding: 0.5rem 1rem; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background-color 0.2s;
        }
        .copy-btn.copied { background-color: var(--green); }
        @media (max-width: 1100px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Applicant Ghost-Buster Filter Generator</h1>
            <p>For zemblov's Business</p>
        </header>
        <div class="grid-container">
            <div class="card">
                <h2>Your Hiring Details</h2>
                <div class="input-group">
                    <label for="business-name">Business Name</label>
                    <input type="text" id="business-name" value="zemblov's Business">
                </div>
                <div class="input-group">
                    <label for="position">Role You're Hiring For</label>
                    <input type="text" id="position" placeholder="e.g., Crew Member, Technician">
                </div>
                <div class="input-group">
                    <label>Top 3 Qualities You Need</label>
                    <select id="quality1" style="margin-bottom: 0.5rem;"><option value="reliability" selected>Reliability</option><option value="skill">Job-Specific Skill</option><option value="attitude">Positive Attitude</option><option value="attention">Attention to Detail</option></select>
                    <select id="quality2" style="margin-bottom: 0.5rem;"><option value="reliability">Reliability</option><option value="skill" selected>Job-Specific Skill</option><option value="attitude">Positive Attitude</option><option value="attention">Attention to Detail</option></select>
                    <select id="quality3"><option value="reliability">Reliability</option><option value="skill">Job-Specific Skill</option><option value="attitude" selected>Positive Attitude</option><option value="attention">Attention to Detail</option></select>
                </div>
                 <div class="input-group">
                    <label for="app-source">Application Source (Indeed, etc.)</label>
                    <input type="text" id="app-source" value="Indeed">
                </div>
                <button id="generate-btn">Generate My Sequence</button>
            </div>
            
            <div id="results" class="card">
                <h2>Your Custom Copy-Paste Sequence</h2>
                <div class="template">
                    <button class="copy-btn" onclick="copyTemplate('auto-reply')">Copy</button>
                    <div class="template-header"><h3>1. Auto-Reply to All Applicants</h3></div>
                    <div class="template-body" id="auto-reply"></div>
                </div>
                 <div class="template">
                     <button class="copy-btn" onclick="copyTemplate('hurdle-questions')">Copy</button>
                    <div class="template-header"><h3>2. Reliability Hurdle Questions</h3></div>
                    <div class="template-body" id="hurdle-questions"></div>
                </div>
                <div class="template">
                     <button class="copy-btn" onclick="copyTemplate('scoring-criteria')">Copy</button>
                    <div class="template-header"><h3>3. Scoring Criteria</h3></div>
                    <div class="template-body" id="scoring-criteria"></div>
                </div>
                 <div class="template">
                     <button class="copy-btn" onclick="copyTemplate('follow-up')">Copy</button>
                    <div class="template-header"><h3>4. 'You Passed' Follow-Up</h3></div>
                    <div class="template-body" id="follow-up"></div>
                </div>
                 <div class="template">
                     <button class="copy-btn" onclick="copyTemplate('confirmation-sequence')">Copy</button>
                    <div class="template-header"><h3>5. Ghost-Proof Confirmation Sequence</h3></div>
                    <div class="template-body" id="confirmation-sequence"></div>
                </div>
            </div>
        </div>
    </div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const password = "emprise2026";
        let enteredPassword = prompt("Hi there, please enter the password:", "");
        if (enteredPassword !== password) {
            document.body.innerHTML = "<h1 style='text-align:center; padding-top: 50px;'>Access Denied</h1>";
            return;
        }
        document.getElementById('generate-btn').addEventListener('click', generateSequence);
    });

    const questionBank = {
        reliability: "This role requires punctuality and consistent attendance. Can you confirm you have reliable transportation and can commit to the schedule described in the job post? A simple 'Yes' is fine.",
        skill: "Thinking about the [Position] role, what is one past experience (professional or personal) that has specifically prepared you to succeed on day one? (2-3 sentences is perfect).",
        attitude: "Every job has its tough days. In 1-2 sentences, can you describe how you stay motivated when faced with a repetitive or challenging task?",
        attention: "To show us you have great attention to detail, please add the word 'Ready' to the subject line of your reply to this email."
    };

    function generateSequence() {
        const businessName = document.getElementById('business-name').value;
        const position = document.getElementById('position').value || "[Role]";
        const appSource = document.getElementById('app-source').value || "your website";
        const qualities = [...new Set([
            document.getElementById('quality1').value,
            document.getElementById('quality2').value,
            document.getElementById('quality3').value
        ])];
        
        const autoReplyText = `Subject: Your application for the ${position} role at ${businessName}

Hi [Applicant Name],

Thanks for your application for the ${position} position via ${appSource}.

To help us prioritize serious candidates and respect everyone's time, our first step is a brief pre-screening questionnaire. Please reply directly to this email with your answers to the 3 questions below.

We review responses within 2 business days and will reach out to schedule an interview if your qualifications align with the role.

Best,
The ${businessName} Team`;
        document.getElementById('auto-reply').innerText = autoReplyText;

        const hurdleQuestionsText = `**Please include your answers to these 3 questions in your reply:**

` + qualities.map((q, i) => `${i + 1}. ${questionBank[q].replace(/\[Position\]/g, position)}`).join('

');
        document.getElementById('hurdle-questions').innerText = hurdleQuestionsText;
        
        const scoringCriteriaText = `**Scoring Framework:**

**GREEN LIGHT (Schedule Interview):**
- Answers all 3 questions thoughtfully.
- Follows any specific instructions (e.g., changing subject line).
- Language is professional and clear.

**YELLOW LIGHT (Use Caution):**
- Gives very short, one-word answers.
- Misses one question or instruction.
- Is a great resume but a lazy reply.

**RED LIGHT (Pass):**
- Doesn't reply at all (perfect, they filtered themselves out!).
- Fails to answer multiple questions or follow instructions.
- Response is sloppy or unprofessional.`;
        document.getElementById('scoring-criteria').innerText = scoringCriteriaText;
        
        const followUpText = `Subject: Next Steps: Interview for ${position} at ${businessName}

Hi [Applicant Name],

Thanks for your thoughtful answers. We were impressed and would like to invite you to a brief phone/video interview to discuss the role further.

Are you available on [Day] at [Time] or [Day] at [Time]?

Please let us know what works best for you. We'll send a calendar invitation to lock it in.

Best,
The ${businessName} Team`;
        document.getElementById('follow-up').innerText = followUpText;

        const confirmationText = `**Confirmation Email (Immediately after scheduling):**
Subject: CONFIRMED: Interview with ${businessName} on [Date]

Hi [Applicant Name],
This is confirmed. We have you down for [Date] at [Time] for your interview for the ${position} role. We look forward to speaking with you!

---

**Reminder Email/Text (24 hours before):**
Hi [Applicant Name], just a friendly reminder about our interview tomorrow at [Time]. Looking forward to our conversation!

---

**Final Reminder Email/Text (1 hour before):**
Hi [Applicant Name], we'll be speaking in about an hour at [Time]. Talk soon!`;
        document.getElementById('confirmation-sequence').innerText = confirmationText;

        document.getElementById('results').style.display = 'block';
    }

    function copyTemplate(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const button = event.target;
            button.textContent = 'Copied!';
            button.classList.add('copied');
            setTimeout(() => { button.textContent = 'Copy'; button.classList.remove('copied'); }, 2000);
        });
    }
</script>
</body>
</html>
